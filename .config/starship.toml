"$schema" = 'https://starship.rs/config-schema.json'

#palette = "tokyonight"

# [palettes.tokyonight]
# blue = '#769ff0'
#
# [palettes.dracula]
# background = "#282a36"
# current_line = "#44475a"
# foreground = "#f8f8f2"
# comment = "#6272a4"
# cyan = "#8be9fd"
# green = "#50fa7b"
# orange = "#ffb86c"
# pink = "#ff79c6"
# purple = "#bd93f9"
# red = "#ff5555"
# yellow = "#f1fa8c"

format = """
$jobs\
$directory\
[Ņé┤](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[Ņé┤](fg:#394260 bg:#212736)\
$package\
$c\
$zig\
$rust\
$golang\
$java\
$maven\
$gradle\
$python\
$nodejs\
\n$status$character"""

[status]
disabled = false

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"Videos" = "¾░©£ "

[jobs]
format = '[$symbol$number ]($style)'
symbol = 'ŌÜÖ'
style = "fg:#e3e5e5 bg:#769ff0"
number_threshold = 1

[git_branch]
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[($all_status$ahead_behind)(fg:#769ff0 bg:#394260)]($style)'
ahead = "ŌćĪ${count} "
behind = "ŌćŻ${count} "
diverged  = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} "
conflicted = '[=$count](fg:pink bg:#394260)) '
stashed = '[\$$count](fg:purple bg:#394260) '
deleted = '[Ō£ś$count](fg:red bg:#394260) '
renamed = '[┬╗$count](fg:orange bg:#394260) '
modified = '[!$count](fg:yellow bg:#394260) '
typechanged = 'T$count '
staged = '[+$count](fg:green bg:#394260) '
untracked = '?$count '

[package]
format = '[\[$symbol$version\]]($style)'

[c]
format = '[\[$symbol($version(-$name))\]]($style)'

[zig]
format = '[\[$symbol($version)\]]($style)'

[rust]
format = '[\[$symbol($version)\]]($style)'

[golang]
format = '[\[$symbol($version)\]]($style)'

[java]
format = '[\[$symbol($version)\]]($style)'

[maven]
format = '[\[$symbol($version)\]]($style)'

[gradle]
format = '[\[$symbol($version)\]]($style)'

[python]
format = '[\[${symbol}${pyenv_prefix}(${version})( \($virtualenv\))\]]($style)'

[nodejs]
format = '[\[$symbol($version)\]]($style)'

[os]
style = "bg:#a3aed2 fg:#090c0c"
format = "[ $symbol ]($style)"
#disabled = false

