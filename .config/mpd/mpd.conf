music_directory		"$XDG_MUSIC_DIR"
playlist_directory	"$XDG_DATA_HOME/mpd/playlists"
db_file		"$XDG_CACHE_HOME/mpd/database"
#do not use log_file if using systemd
log_file	"$XDG_CACHE_HOME/mpd/mpd.log"
# do not use pid_file if using systemd
pid_file	"$XDG_RUNTIME_DIR/mpd.pid"
state_file	"$XDG_STATE_HOME/mpd/state"
sticker_file	"$XDG_CACHE_HOME/mpd/sticker.sql"

bind_to_address	"127.0.0.1"
port		"6600"

auto_update		"yes"
restore_paused		"yes"
max_output_buffer_size "16384"

audio_output {
	type "pipewire"
	name "Pipewire Sound Server"
}

audio_output {
	type	"fifo"
	name	"Visualizer feed"
	path	"/tmp/mpd.fifo"
	format	"44100:16:2"
}
