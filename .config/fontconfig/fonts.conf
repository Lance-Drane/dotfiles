<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd" [
  <!ENTITY sansserif "Libertinus Sans">
  <!ENTITY serif "Libertinus Serif">
  <!ENTITY monospace "0xProto Nerd Font">
  <!ENTITY math "Libertinus Math">
  <!ENTITY nerdfont "0xProto Nerd Font">
]>
<!--
  - all fonts are defined as ENTITY above, just edit those.
  - "nerdfont" is meant to be a fallback font if other fonts need to show special symbols
  - emoji is handled well enough by the system font, unless a specific emoji set should be forced
-->
<fontconfig>
  <!-- SANS -->
  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>sans-serif</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&sansserif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>ui-sans-serif</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&sansserif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <!-- SERIF -->
  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>serif</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&serif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>ui-serif</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&serif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <!-- MONOSPACE -->
  <match target="pattern">
	<test name="family" qual="prepend_first" compare="eq">
	  <string>monospace</string>
	</test>
	<edit name="family" mode="assign" binding="strong">
	  <string>&monospace;</string>
	</edit>
  </match>

  <match target="pattern">
	<test name="family" qual="prepend_first" compare="eq"> 
	  <string>ui-monospace</string>
	</test> 
	<edit name="family" mode="assign" binding="strong"> 
	  <string>&monospace;</string>
	</edit> 
  </match>

  <!-- MATH - not handled well by system fontconfig -->
  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>math</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&math;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <!-- system fonts -->
  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>system-ui</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&sansserif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>-apple-system</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&sansserif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>

  <match target="pattern">
	<test name="family" qual="any" compare="eq">
	  <string>BlinkMacSystemFont</string>
	</test>
	<edit name="family" mode="prepend_first" binding="strong">
	  <string>&sansserif;</string>
	</edit>
	<edit name="family" mode="append_last" binding="weak">
	  <string>&nerdfont;</string>
	</edit>
  </match>
</fontconfig>

